spring.application.name=backend

server.port=${SERVER_PORT:8090}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:chatop_db}?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:chatop_user}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initializationFailTimeout=0

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
app.jwt.secret=${APP_JWT_SECRET:change-me-with-a-long-secret-key-change-me-with-a-long-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

springdoc.swagger-ui.path=/swagger-ui.html
